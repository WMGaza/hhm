<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حمامة ديلفري - النسخة الاحترافية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 95%; max-width: 1100px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8eaed; padding-bottom: 10px; margin-bottom: 5px; }
        .project-name { color: #5f6368; font-size: 14px; margin-bottom: 20px; }
        .status-msg { font-weight: bold; color: #1a73e8; margin-bottom: 15px; }
        .controls { margin: 20px 0; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin-left: 10px; transition: 0.2s; font-weight: bold; }
        #startBtn { background-color: #34a853; color: white; }
        #stopBtn { background-color: #ea4335; color: white; }
        button:disabled { background-color: #dadce0; cursor: not-allowed; }
        .live-preview { background: #f8f9fa; border-right: 4px solid #1a73e8; padding: 15px; margin: 15px 0; min-height: 100px; color: #333; line-height: 1.6; font-size: 18px; white-space: pre-wrap; text-align: right; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e8eaed; padding: 15px; text-align: center; }
        th { background-color: #1a73e8; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <div class="container">
        <h2>نظام حمامة ديلفري - معالجة الطلبات</h2>
        <div class="project-name">وكالة فلسطين الرقمية | إدارة العمليات</div>
        <div id="status" class="status-msg">الحالة: جاهز</div>
        
        <div class="controls">
            <button id="startBtn">بدء التسجيل</button>
            <button id="stopBtn" disabled>تحليل وإيقاف</button>
        </div>

        <div id="liveText" class="live-preview"></div>

        <table id="deliveryTable">
            <thead>
                <tr>
                    <th>اسم الزبون</th>
                    <th>العنوان</th>
                    <th>الطلب</th>
                    <th>السعر</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const liveText = document.getElementById('liveText');
        const tableBody = document.querySelector('#deliveryTable tbody');
        const statusMsg = document.getElementById('status');

        let recognition;
        let isManualStop = false;
        let accumulatedTranscript = ""; // لحل مشكلة اختفاء النص عند السكوت

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onend = () => {
                if (!isManualStop) recognition.start();
            };

            recognition.onresult = (event) => {
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        accumulatedTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                liveText.innerText = accumulatedTranscript + interimTranscript;
            };
        }

        startBtn.onclick = () => {
            isManualStop = false;
            accumulatedTranscript = "";
            liveText.innerText = "";
            recognition.start();
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusMsg.innerText = "جاري التسجيل المستمر...";
        };

        stopBtn.onclick = () => {
            isManualStop = true;
            recognition.stop();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            if (liveText.innerText.trim()) {
                statusMsg.innerText = "جاري التحليل المعمق...";
                analyzeWithGroq(liveText.innerText.trim());
            }
        };

        async function analyzeWithGroq(text) {
            const url = "https://api.groq.com/openai/v1/chat/completions";
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{
                            role: "user",
                            content: `استخرج الطلبات كـ JSON Array. لا تضع أي علامات ترقيم (فواصل أو نقاط) في النصوص العربية. الحقول: (customer_name, location, order_details, price). إذا كان هناك أكثر من طلب استخرجهم جميعاً في مصفوفة واحدة. النص: ${text}`
                        }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const rawContent = data.choices[0].message.content;
                const result = JSON.parse(rawContent);
                
                // حل مشكلة TypeError: البحث عن المصفوفة داخل الكائن بأي مسمى
                let orders = [];
                if (Array.isArray(result)) {
                    orders = result;
                } else {
                    const keys = Object.keys(result);
                    orders = Array.isArray(result[keys[0]]) ? result[keys[0]] : [result];
                }

                orders.forEach(item => {
                    if(item.customer_name || item.order_details) {
                        tableBody.innerHTML += `<tr>
                            <td>${item.customer_name || "-"}</td>
                            <td>${item.location || "-"}</td>
                            <td>${item.order_details || "-"}</td>
                            <td>${item.price || "0"}</td>
                        </tr>`;
                    }
                });
                statusMsg.innerText = "تمت إضافة البيانات للجدول.";
            } catch (e) {
                statusMsg.innerText = "حدث خطأ في معالجة البيانات.";
                console.error("Error details:", e);
            }
        }
    </script>
</body>
</html>
