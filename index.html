<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حمامة ديلفري الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 95%; max-width: 1100px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8eaed; padding-bottom: 10px; margin-bottom: 5px; }
        .project-name { color: #5f6368; font-size: 14px; margin-bottom: 20px; }
        .controls { margin: 20px 0; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin-left: 10px; transition: 0.2s; font-weight: bold; }
        #startBtn { background-color: #34a853; color: white; }
        #stopBtn { background-color: #ea4335; color: white; }
        button:disabled { background-color: #dadce0; cursor: not-allowed; }
        .live-preview { background: #f8f9fa; border-right: 4px solid #1a73e8; padding: 15px; margin: 15px 0; min-height: 60px; color: #333; line-height: 1.6; font-size: 18px; white-space: pre-wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #e8eaed; padding: 15px; text-align: center; }
        th { background-color: #1a73e8; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .status-msg { font-weight: bold; color: #1a73e8; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>نظام حمامة ديلفري - معالجة الطلبات بالذكاء الاصطناعي</h2>
        <div class="project-name">وكالة فلسطين الرقمية | إدارة العمليات</div>
        <div class="status-msg" id="status">الحالة: جاهز للعمل</div>
        
        <div class="controls">
            <button id="startBtn">بدء التسجيل المستمر</button>
            <button id="stopBtn" disabled>إيقاف وتحليل الطلب</button>
        </div>

        <div class="live-preview" id="liveText"></div>

        <table id="deliveryTable">
            <thead>
                <tr>
                    <th>اسم الزبون</th>
                    <th>المنطقة / العنوان</th>
                    <th>تفاصيل الطلب</th>
                    <th>السعر (شيكل)</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyCSeBUWqnloD4Qc8QVjvesz93TmgTIcMIE"; 
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const liveText = document.getElementById('liveText');
        const tableBody = document.querySelector('#deliveryTable tbody');
        const statusMsg = document.getElementById('status');

        let finalTranscript = "";
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.lang = 'ar-SA';
        recognition.continuous = true;
        recognition.interimResults = true;

        startBtn.addEventListener('click', () => {
            finalTranscript = "";
            liveText.innerText = "";
            recognition.start();
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusMsg.innerText = "جاري الاستماع... سجل طلباتك بوضوح";
        });

        recognition.onresult = (event) => {
            let interimTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + " ";
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            liveText.innerText = finalTranscript + interimTranscript;
        };

        stopBtn.addEventListener('click', () => {
            recognition.stop();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            const textToAnalyze = liveText.innerText.trim();
            
            if (textToAnalyze) {
                statusMsg.innerText = "جاري تحليل البيانات بواسطة Gemini...";
                analyzeWithGemini(textToAnalyze);
            } else {
                statusMsg.innerText = "تنبيه: لم يتم العثور على نص للتحليل.";
            }
        });

        async function analyzeWithGemini(text) {
            // تصحيح الرابط لضمان عدم وجود أخطاء 404
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            
            const prompt = `أنت موظف إدخال بيانات في شركة "حمامة ديلفري". 
            حلل النص واستخرج كافة الطلبات الموجودة فيه.
            الناتج يجب أن يكون JSON Array فقط.
            لا تستخدم فواصل أو نقاط في القيم المستخرجة نهائياً.
            البيانات المطلوبة لكل طلب: (customer_name, location, order_details, price).
            النص: "${text}"`;

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                // فحص الأمان لمنع خطأ TypeError
                if (data && data.candidates && data.candidates[0] && data.candidates[0].content) {
                    let responseContent = data.candidates[0].content.parts[0].text;
                    const jsonMatch = responseContent.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
                    
                    if (jsonMatch) {
                        let result = JSON.parse(jsonMatch[0]);
                        if (!Array.isArray(result)) result = [result];

                        result.forEach(item => {
                            const row = `<tr>
                                <td>${item.customer_name || "غير معروف"}</td>
                                <td>${item.location || "غير محدد"}</td>
                                <td>${item.order_details || "لا يوجد"}</td>
                                <td>${item.price || "0"}</td>
                            </tr>`;
                            tableBody.innerHTML += row;
                        });
                        statusMsg.innerText = "تم تحديث جدول العمليات بنجاح.";
                    }
                } else {
                    throw new Error("لم يتم استلام رد صحيح من الخادم.");
                }
            } catch (error) {
                console.error("Analysis Error:", error);
                statusMsg.innerText = "حدث خطأ: " + error.message;
            }
        }

        recognition.onerror = () => {
            statusMsg.innerText = "خطأ في الميكروفون أو الاتصال.";
            startBtn.disabled = false;
        };
    </script>
</body>
</html>
